version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solara-optima-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/solara_optima
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      - db
      - redis
    networks:
      - solar-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solara-optima-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - solar-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: solara-optima-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: solara_optima
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - solar-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: solara-optima-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - solar-network
    restart: unless-stopped

  # Ollama (AI Models)
  ollama:
    image: ollama/ollama:latest
    container_name: solara-optima-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - solar-network
    restart: unless-stopped
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Celery Worker (Background Tasks)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solara-optima-worker
    command: celery -A app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/solara_optima
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      - db
      - redis
      - ollama
    networks:
      - solar-network
    restart: unless-stopped

networks:
  solar-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
