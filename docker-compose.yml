version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solara-optima-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Inside the compose network the hostnames are the service names.
      # Credentials come from .env (POSTGRES_USER / POSTGRES_PASSWORD).
      - DATABASE_URL=postgresql://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      # /health endpoint is defined in app/main.py.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solara-optima-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # PostgreSQL Database — credentials must come from .env (no defaults).
  db:
    image: postgres:15-alpine
    container_name: solara-optima-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port not exposed to host by default. Uncomment for local DB tooling.
    # ports:
    #   - "5432:5432"
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: solara-optima-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Ollama (AI Models)
  ollama:
    image: ollama/ollama:latest
    container_name: solara-optima-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      # Ollama serves /api/tags as a lightweight liveness probe.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Celery Worker (Background Tasks) — disabled until app.celery is wired up.
  # Re-enable by defining a Celery instance in app/celery.py and removing this comment block.
  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: solara-optima-worker
  #   command: celery -A app.celery worker --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@db:5432/solara_optima
  #     - REDIS_URL=redis://redis:6379/0
  #     - OLLAMA_HOST=http://ollama:11434
  #   volumes:
  #     - ./backend/app:/app/app
  #     - ./data:/app/data
  #   depends_on:
  #     - db
  #     - redis
  #     - ollama
  #   networks:
  #     - solar-network
  #   restart: unless-stopped

networks:
  solar-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
